<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rabbitt.AI – Rotating Diamond</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #000;
      color: #efefef;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ─── Hero section ─────────────────────────────────────────── */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1536px;
      margin: 0 auto;
      min-height: calc(98vh - 80px);
      align-items: center;
    }

    /* left copy */
    .hero-copy {
      padding: 2rem;
      margin-right: 1.25rem;
      z-index: 10;
    }

    .headline {
      font-size: clamp(2rem, 5vw, 4.5rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 2.5rem;
    }

    .headline .gradient {
      background: linear-gradient(90deg, #fff, #0061ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      color: #d1d5db;
      font-size: clamp(1rem, 2vw, 1.5rem);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .cta-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      border-radius: 9999px;
      padding: 0.625rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: background-color 0.3s;
      display: inline-block;
    }

    .btn-dark  { background: #2d2d2d; color: #efefef; }
    .btn-dark:hover  { background: #1d1d1d; }
    .btn-blue  { background: #0061ff; color: #EBF4F6; }
    .btn-blue:hover  { background: #0050e6; }

    /* right – diamond video */
    .hero-video {
      margin: 4rem 0;
      opacity: 0;
      transform: translateY(50px);
      animation: rise 0.9s ease forwards 0.3s;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-video video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: scale(1.25);
      display: block;
    }

    /* ─── Responsive ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: unset;
        padding: 2rem 1rem;
      }
      .hero-video {
        height: 14rem;
        margin: 2rem 0;
      }
      .hero-copy { margin-right: 0; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <!-- Left: copy -->
    <div class="hero-copy">
      <h1 class="headline">
        Own <span class="gradient">your AI,</span><br />
        Own <span class="gradient">your Data</span>
      </h1>
      <p class="sub">
        Rabbitt.AI taps into the full potential of enterprise data to develop
        reliable Generative AI Solutions you can count on.
      </p>
      <div class="cta-group">
        <a class="btn btn-dark" href="#">Get Started</a>
        <a class="btn btn-blue" href="#">Talk To Rabbitt</a>
      </div>
    </div>

    <!-- Right: rotating diamond video -->
    <div class="hero-video">
      <video
        src="diamond.mp4"
        autoplay
        loop
        muted
        playsinline
      ></video>
    </div>
  </section>

</body>
</html>
